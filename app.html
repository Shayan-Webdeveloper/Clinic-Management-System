  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ClinicCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="app-page">

  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="brand-logo">
        <i class="bi bi-heart-pulse"></i>
        <span>ClinicCare</span>
      </div>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar-sm" id="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="user-name">User</div>
          <div id="user-role"></div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <button class="btn btn-light d-lg-none" id="sidebar-toggle">
        <i class="bi bi-list fs-5"></i>
      </button>
      <div class="header-search d-none d-md-block">
        <i class="bi bi-search"></i>
        <input type="text" class="form-control" placeholder="Search patients, appointments..." id="global-search">
      </div>
      <div class="header-actions">
        <button class="btn btn-light btn-icon position-relative">
          <i class="bi bi-bell"></i>
          <span class="notification-dot"></span>
        </button>
        <div class="dropdown">
          <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i> Account
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-2"></i>Sign Out</a></li>
          </ul>
        </div>
      </div>
    </header>

    <div class="page-wrapper">
      <div id="page-content"></div>
    </div>
  </main>

  <div id="global-loader" class="global-loader d-none">
    <div class="spinner-border text-primary"></div>
  </div>
  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/patients.js"></script>
  <script src="js/doctors.js"></script>
  <script src="js/appointments.js"></script>
  <script src="js/visits.js"></script>
  <script src="js/prescriptions.js"></script>
  <script src="js/billing.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('global-search')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        App.navigate('patients');
        Patients.searchQuery = e.target.value;
        Patients.render();
      }
    });
  </script>
</body>
</html>
