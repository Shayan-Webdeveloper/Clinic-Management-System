<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password — ClinicCare</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body {
      background: #f1f5f9;
      font-family: 'Inter', sans-serif;
    }

    .reset-card {
      max-width: 420px;
      margin: 10vh auto;
      background: #fff;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #0d9488;
    }

    .brand i {
      font-size: 22px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .form-control {
      border-radius: 10px;
      padding: 10px;
    }

    .btn-primary {
      background: #0d9488;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #0f766e;
    }

    .note {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="reset-card">

  <div class="brand">
    <i class="bi bi-heart-pulse"></i>
    ClinicCare
  </div>

  <div class="title">Set new password</div>
  <div class="subtitle">Enter your new secure password below</div>

  <input type="password" id="new-password" class="form-control mb-3" placeholder="New password">

  <button id="update-btn" class="btn btn-primary w-100">
  Update Password
</button>

  <div class="note text-center">
    Make sure your password is strong and secure
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/config.js"></script>
<script>
  document
  .getElementById("update-btn")
  .addEventListener("click", updatePassword);

document.addEventListener("DOMContentLoaded", async () => {

  initSupabase();

  // Recover session from email reset link
  const hash = window.location.hash;

  if (hash) {
    const params = new URLSearchParams(hash.substring(1));

    const access_token = params.get("access_token");
    const refresh_token = params.get("refresh_token");

    if (access_token && refresh_token) {
      const { error } = await supabase.auth.setSession({
        access_token,
        refresh_token
      });

      if (error) {
        console.error(error);
        alert("Invalid or expired reset link.");
      }
    }
  }
});

async function updatePassword() {
  const password = document.getElementById("new-password").value;

  if (!password || password.length < 6) {
    alert("Password must be at least 6 characters");
    return;
  }

  const { error } = await sb.auth.updateUser({
    password: password
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Password updated successfully!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
